<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipes</title>

  <link rel="stylesheet" href="styles/reset.css" />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">Food.</div>

      <nav aria-label="Primary">
        <ul class="nav-list">
          <li><a class="nav-link" href="#">Works</a></li>
          <li><a class="nav-link" href="#">Services</a></li>
          <li><a class="nav-link" href="#">Contacts</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <section class="card recipe" aria-label="Recipe hero">
        <div class="recipe-content">
          <p class="kicker">Recipes</p>
          <h1 class="title">Pumpkin Soup</h1>
          <p class="text">
            Fusce vehicula dolor arcu, sit amet blandit dolor mollis nec.
            Donec viverra eleifend lacus, vitae ullamcor.
          </p>
        </div>

        <div class="recipe-media">
          <picture>
            <source
              media="(min-width: 1024px)"
              srcset="
                images/recipe-1440.jpg 1x,
                images/recipe-1440@2x.jpg 2x
              "
            />
            <source
              media="(min-width: 768px)"
              srcset="
                images/recipe-960.jpg 1x,
                images/recipe-960@2x.jpg 2x
              "
            />
            <img
              src="images/recipe-480.jpg"
              srcset="
                images/recipe-480.jpg 1x,
                images/recipe-480@2x.jpg 2x
              "
              alt="Pumpkin soup in a bowl"
              loading="lazy"
            />
          </picture>
        </div>

      </section>
    </div>
  </main>

</body>
</html>
