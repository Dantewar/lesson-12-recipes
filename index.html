<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipes</title>

  <link rel="stylesheet" href="styles/reset.css" />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="#">Food.</a>

      <nav aria-label="Primary">
        <ul class="nav-list">
          <li><a class="nav-link" href="#">Food</a></li>
          <li><a class="nav-link" href="#">Recipes</a></li>
          <li><a class="nav-link" href="#">About</a></li>
          <li><a class="nav-link" href="#">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <section class="card recipe" aria-label="Recipes hero">

        <div class="recipe-content">
          <p class="kicker">Recipes</p>
          <h1 class="title">Recipes</h1>

          <p class="text">
            Fusce vehicula dolor arcu, sit amet blandit dolor mollis nec.
            Donec viverra eleifend lacus, vitae ullamcor.
          </p>
        </div>

        <div class="recipe-media">
          <picture>
            <source
              media="(min-width: 1024px)"
              srcset="images/recipe-1440.jpg 1x, images/recipe-1440@2x.jpg 2x">

            <source
              media="(min-width: 768px)"
              srcset="images/recipe-768.jpg 1x, images/recipe-768@2x.jpg 2x">

            <img
              src="images/recipe-320.jpg"
              srcset="images/recipe-320.jpg 1x, images/recipe-320@2x.jpg 2x"
              alt="Pumpkin soup"
              loading="lazy">
          </picture>
        </div>

      </section>
    </div>
  </main>

</body>
</html>
